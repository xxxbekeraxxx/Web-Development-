<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>8 Наурыз — Алтынай & Аяжан</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose: #f7a8c4;
    --blush: #f9c6d5;
    --deep: #c2185b;
    --plum: #7b1fa2;
    --lavender: #ce93d8;
    --gold: #ffd54f;
    --cream: rgba(255,245,250,0.92);
    --glow-rose: rgba(247,168,196,0.7);
    --glow-plum: rgba(123,31,162,0.5);
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Cormorant Garamond', Georgia, serif;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    background: #1a0a14;
  }

  /* ── BG CANVAS ── */
  #bgCanvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
  }

  /* ── TOUCH CANVAS ── */
  #touchCanvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 2;
    pointer-events: none;
  }

  /* ── CONFETTI CANVAS ── */
  #confettiCanvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 5;
    pointer-events: none;
    display: none;
  }

  /* ── INTRO SCREEN ── */
  #intro {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(160deg, #2d0a1e 0%, #1a0a30 50%, #0d0520 100%);
    cursor: pointer;
    transition: opacity 0.8s ease, visibility 0.8s ease;
  }
  #intro.fade-out { opacity: 0; visibility: hidden; }

  .intro-date {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3.5rem, 18vw, 5.5rem);
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.04em;
    text-shadow:
      0 0 20px var(--glow-rose),
      0 0 60px var(--glow-rose),
      0 0 120px rgba(194,24,91,0.6);
    animation: pulse-glow 2s ease-in-out infinite alternate;
    line-height: 1;
  }
  .intro-sub {
    margin-top: 1rem;
    font-size: clamp(1rem, 5vw, 1.4rem);
    color: var(--blush);
    letter-spacing: 0.25em;
    opacity: 0.85;
    font-style: italic;
    animation: pulse-glow 2s ease-in-out infinite alternate 0.3s;
  }
  .intro-tap {
    margin-top: 2.5rem;
    font-size: clamp(0.75rem, 3.5vw, 1rem);
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.15em;
    animation: blink 1.8s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    from { text-shadow: 0 0 20px var(--glow-rose), 0 0 60px var(--glow-rose), 0 0 120px rgba(194,24,91,0.6); }
    to   { text-shadow: 0 0 40px #ff6eb0, 0 0 90px #ff6eb0, 0 0 160px rgba(194,24,91,0.9), 0 0 220px rgba(123,31,162,0.5); }
  }
  @keyframes blink {
    0%,100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* ── MAIN SCREEN ── */
  #main {
    position: fixed;
    inset: 0;
    z-index: 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 0 4vw;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.8s ease 0.3s, visibility 0.8s ease 0.3s;
  }
  #main.visible { opacity: 1; visibility: visible; }

  .top-bar {
    width: 100%;
    display: flex;
    justify-content: flex-end;
    padding: 1rem 0 0;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .audio-btn {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 50%;
    width: 2.6rem;
    height: 2.6rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    cursor: pointer;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: #fff;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .audio-btn:active { background: rgba(255,255,255,0.22); }

  /* ── CARD ── */
  .card {
    width: 100%;
    max-width: 430px;
    margin: 1rem auto 2rem;
    background: rgba(255, 240, 248, 0.10);
    border: 1px solid rgba(255,180,210,0.25);
    border-radius: 1.8rem;
    padding: 2rem 1.5rem 2rem;
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    box-shadow:
      0 0 40px rgba(247,168,196,0.15),
      0 0 80px rgba(123,31,162,0.10),
      inset 0 1px 0 rgba(255,255,255,0.15);
    animation: card-float 5s ease-in-out infinite alternate;
  }
  @keyframes card-float {
    from { transform: translateY(0px); }
    to   { transform: translateY(-6px); }
  }

  .card-header {
    text-align: center;
    margin-bottom: 1.5rem;
  }
  .date-label {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 11vw, 3.5rem);
    font-weight: 700;
    color: #fff;
    line-height: 1;
    text-shadow: 0 0 30px var(--glow-rose), 0 0 60px rgba(194,24,91,0.5);
  }
  .florals {
    font-size: clamp(1.4rem, 7vw, 2rem);
    letter-spacing: 0.3em;
    margin: 0.4rem 0;
  }
  .names {
    margin-top: 0.6rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.25rem;
  }
  .name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 7vw, 2rem);
    font-style: italic;
    font-weight: 400;
    color: var(--blush);
    text-shadow: 0 0 20px var(--glow-rose), 0 0 40px rgba(247,168,196,0.5);
    animation: name-glow 3s ease-in-out infinite alternate;
  }
  .name-sep { color: rgba(255,255,255,0.4); font-size: 1rem; }
  @keyframes name-glow {
    from { text-shadow: 0 0 15px var(--glow-rose), 0 0 35px rgba(247,168,196,0.4); }
    to   { text-shadow: 0 0 30px #ff80ab, 0 0 60px rgba(255,128,171,0.6), 0 0 90px rgba(194,24,91,0.3); }
  }

  /* ── BUTTON ── */
  .magic-btn {
    display: block;
    width: 92%;
    margin: 1.2rem auto 0;
    padding: 1.1rem 0;
    background: linear-gradient(135deg, #e91e8c, #9c27b0, #e91e8c);
    background-size: 200% 200%;
    border: none;
    border-radius: 3rem;
    color: #fff;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.15rem, 5.5vw, 1.4rem);
    font-weight: 600;
    letter-spacing: 0.05em;
    cursor: pointer;
    box-shadow:
      0 4px 30px rgba(233,30,140,0.5),
      0 0 60px rgba(233,30,140,0.2),
      inset 0 1px 0 rgba(255,255,255,0.25);
    animation: btn-gradient 3s ease infinite, btn-pulse 2.5s ease-in-out infinite;
    transition: transform 0.15s, box-shadow 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .magic-btn:active {
    transform: scale(0.96);
    box-shadow: 0 2px 15px rgba(233,30,140,0.4);
  }
  .magic-btn.hidden { display: none; }
  @keyframes btn-gradient {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  @keyframes btn-pulse {
    0%,100% { box-shadow: 0 4px 30px rgba(233,30,140,0.5), 0 0 60px rgba(233,30,140,0.2), inset 0 1px 0 rgba(255,255,255,0.25); }
    50%      { box-shadow: 0 4px 50px rgba(233,30,140,0.8), 0 0 90px rgba(233,30,140,0.4), inset 0 1px 0 rgba(255,255,255,0.25); }
  }

  /* ── MESSAGE ── */
  .message-wrap {
    display: none;
    margin-top: 1.2rem;
  }
  .message-wrap.show { display: block; }

  .message-text {
    color: rgba(255,240,250,0.92);
    font-size: clamp(1rem, 4.5vw, 1.2rem);
    line-height: 1.85;
    font-style: italic;
    font-weight: 300;
    text-align: center;
    min-height: 2em;
  }
  .message-text .highlight {
    color: var(--blush);
    font-weight: 600;
    font-style: normal;
    text-shadow: 0 0 12px var(--glow-rose);
  }

  .signature {
    margin-top: 1.5rem;
    text-align: right;
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.1rem, 5vw, 1.4rem);
    color: var(--rose);
    font-style: italic;
    opacity: 0;
    transition: opacity 1s ease;
    text-shadow: 0 0 20px var(--glow-rose);
  }
  .signature.show { opacity: 1; }

  .divider {
    width: 60%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(247,168,196,0.5), transparent);
    margin: 1.2rem auto;
  }

  /* ── FOOTER FLOWERS ── */
  .bottom-decor {
    text-align: center;
    font-size: clamp(1.5rem, 7vw, 2rem);
    letter-spacing: 0.4em;
    opacity: 0.6;
    margin-top: 0.5rem;
  }
</style>
</head>
<body>

<!-- BG CANVAS -->
<canvas id="bgCanvas"></canvas>
<!-- TOUCH CANVAS -->
<canvas id="touchCanvas"></canvas>
<!-- CONFETTI CANVAS -->
<canvas id="confettiCanvas"></canvas>

<!-- INTRO -->
<div id="intro">
  <div class="intro-date">8 Наурыз</div>
  <div class="intro-sub">Мерекемен ✨</div>
  <div class="intro-tap">Басу үшін тап</div>
</div>

<!-- MAIN -->
<div id="main">
  <div class="top-bar">
    <button class="audio-btn" id="audioBtn" title="Музыка">🔇</button>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="date-label">8 Наурыз</div>
      <div class="florals">🌸🌷🌺</div>
      <div class="names">
        <span class="name">Алтынай</span>
        <span class="name-sep">&amp;</span>
        <span class="name">Аяжан</span>
      </div>
    </div>

    <div class="divider"></div>

    <button class="magic-btn" id="magicBtn">✨ Сиқыр ашу</button>

    <div class="message-wrap" id="messageWrap">
      <div class="message-text" id="messageText"></div>
      <div class="signature" id="signature">— Ералы ❤️</div>
    </div>

    <div class="bottom-decor" id="bottomDecor">🌷🌸🌹</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
//  UTILITY
// ═══════════════════════════════════════════════
const $ = id => document.getElementById(id);
const rnd = (a, b) => Math.random() * (b - a) + a;
const rndInt = (a, b) => Math.floor(rnd(a, b + 1));
const PI2 = Math.PI * 2;

// ═══════════════════════════════════════════════
//  BG CANVAS — petals + stars
// ═══════════════════════════════════════════════
(function bgSetup() {
  const canvas = $('bgCanvas');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // gradient bg
  function drawBg() {
    const g = ctx.createLinearGradient(0, 0, W * 0.6, H);
    g.addColorStop(0,   '#2d0a1e');
    g.addColorStop(0.4, '#1a0830');
    g.addColorStop(1,   '#0d051a');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }

  // stars
  const STAR_COUNT = 60;
  const stars = Array.from({length: STAR_COUNT}, () => ({
    x: rnd(0, 1),
    y: rnd(0, 1),
    r: rnd(0.8, 2.2),
    phase: rnd(0, PI2),
    speed: rnd(0.008, 0.025),
    color: Math.random() < 0.4 ? '#ffd6eb' : '#e8d5f5'
  }));

  function drawStars(t) {
    stars.forEach(s => {
      const alpha = 0.3 + 0.5 * Math.sin(t * s.speed + s.phase);
      ctx.beginPath();
      ctx.arc(s.x * W, s.y * H, s.r, 0, PI2);
      ctx.fillStyle = s.color.replace(')', `,${alpha})`).replace('rgb', 'rgba').replace('#', '');
      // simpler:
      ctx.globalAlpha = alpha;
      ctx.fillStyle = s.color;
      ctx.fill();
      ctx.globalAlpha = 1;
    });
  }

  // petals
  const PETAL_COUNT = 35;
  const PETAL_COLORS = ['#f48fb1','#f06292','#ce93d8','#f8bbd0','#ffcdd2','#e1bee7','#ffd54f'];

  function makePetal() {
    return {
      x: rnd(0, 1),
      y: rnd(-0.2, 1.2),
      size: rnd(5, 14),
      vx: rnd(-0.08, 0.08),
      vy: rnd(0.04, 0.12),
      angle: rnd(0, PI2),
      spin: rnd(-0.015, 0.015),
      sway: rnd(0.3, 1.2),
      swayPhase: rnd(0, PI2),
      color: PETAL_COLORS[rndInt(0, PETAL_COLORS.length - 1)],
      alpha: rnd(0.5, 0.9)
    };
  }

  const petals = Array.from({length: PETAL_COUNT}, makePetal);

  function drawPetal(ctx, p) {
    ctx.save();
    ctx.translate(p.x * W, p.y * H);
    ctx.rotate(p.angle);
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    // simple ellipse petal
    ctx.beginPath();
    ctx.ellipse(0, 0, p.size * 0.55, p.size, 0, 0, PI2);
    ctx.fill();
    // inner shine
    ctx.globalAlpha = p.alpha * 0.4;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(-p.size * 0.1, -p.size * 0.3, p.size * 0.18, p.size * 0.35, -0.2, 0, PI2);
    ctx.fill();
    ctx.restore();
  }

  function updatePetals(t) {
    petals.forEach(p => {
      p.x += p.vx * 0.01 + Math.sin(t * 0.5 + p.swayPhase) * p.sway * 0.0003;
      p.y += p.vy * 0.01;
      p.angle += p.spin;
      if (p.y > 1.15) { Object.assign(p, makePetal()); p.y = -0.1; }
      if (p.x < -0.05) p.x = 1.05;
      if (p.x > 1.05)  p.x = -0.05;
    });
  }

  let t = 0;
  function loop() {
    t += 1;
    drawBg();
    drawStars(t);
    petals.forEach(p => drawPetal(ctx, p));
    updatePetals(t);
    requestAnimationFrame(loop);
  }
  loop();
})();

// ═══════════════════════════════════════════════
//  TOUCH CANVAS — hearts & sparks on touch
// ═══════════════════════════════════════════════
(function touchSetup() {
  const canvas = $('touchCanvas');
  const ctx = canvas.getContext('2d');
  let W, H;
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  const particles = [];

  function spawnAt(x, y) {
    const count = 5;
    for (let i = 0; i < count; i++) {
      const isHeart = Math.random() < 0.5;
      particles.push({
        x, y,
        vx: rnd(-2, 2),
        vy: rnd(-3.5, -0.5),
        alpha: 1,
        size: rnd(8, 16),
        isHeart,
        color: isHeart
          ? `hsl(${rndInt(330,360)},100%,${rndInt(60,80)}%)`
          : `hsl(${rndInt(280,360)},90%,${rndInt(70,90)}%)`,
        life: rnd(40, 70)
      });
    }
  }

  function drawHeart(ctx, x, y, size) {
    const s = size / 10;
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(s, s);
    ctx.beginPath();
    ctx.moveTo(0, -3);
    ctx.bezierCurveTo(0, -6, -5, -6, -5, -2);
    ctx.bezierCurveTo(-5, 2, 0, 6, 0, 8);
    ctx.bezierCurveTo(0, 6, 5, 2, 5, -2);
    ctx.bezierCurveTo(5, -6, 0, -6, 0, -3);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function loop() {
    ctx.clearRect(0, 0, W, H);
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.08;
      p.alpha -= 1 / p.life;
      p.life--;
      if (p.life <= 0) { particles.splice(i, 1); continue; }
      ctx.globalAlpha = Math.max(0, p.alpha);
      ctx.fillStyle = p.color;
      if (p.isHeart) {
        drawHeart(ctx, p.x, p.y, p.size);
      } else {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * 0.35, 0, PI2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(loop);
  }
  loop();

  let lastSpawn = 0;
  function onMove(x, y) {
    const now = Date.now();
    if (now - lastSpawn < 60) return;
    lastSpawn = now;
    spawnAt(x, y);
  }

  window.addEventListener('touchmove', e => {
    const t = e.touches[0];
    onMove(t.clientX, t.clientY);
  }, { passive: true });
  window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
})();

// ═══════════════════════════════════════════════
//  CONFETTI CANVAS — explosion on button press
// ═══════════════════════════════════════════════
const confettiCanvas = $('confettiCanvas');
const confettiCtx = confettiCanvas.getContext('2d');
let confettiW, confettiH;
function resizeConfetti() {
  confettiW = confettiCanvas.width  = window.innerWidth;
  confettiH = confettiCanvas.height = window.innerHeight;
}
resizeConfetti();
window.addEventListener('resize', resizeConfetti);

let confettiParticles = [];
let confettiRunning = false;
let confettiRAF = null;

const CONF_COLORS = [
  '#ff80ab','#f48fb1','#ea80fc','#b39ddb',
  '#80d8ff','#ffd740','#ff6e40','#69f0ae',
  '#ff4081','#e040fb','#ffab40'
];
const EMOJIS = ['🌸','🌷','🌺','💐','❤️','💕','✨','🌹'];

function spawnConfettiExplosion() {
  confettiParticles = [];
  const CX = confettiW / 2;
  const CY = confettiH * 0.4;

  // circles
  for (let i = 0; i < 80; i++) {
    const angle = rnd(0, PI2);
    const speed = rnd(3, 14);
    confettiParticles.push({
      type: 'circle',
      x: CX + rnd(-40, 40),
      y: CY,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - rnd(2, 8),
      r: rnd(4, 10),
      color: CONF_COLORS[rndInt(0, CONF_COLORS.length - 1)],
      alpha: 1,
      spin: rnd(-0.15, 0.15),
      gravity: 0.25,
      life: rnd(60, 120)
    });
  }

  // hearts
  for (let i = 0; i < 30; i++) {
    const angle = rnd(0, PI2);
    const speed = rnd(2, 9);
    confettiParticles.push({
      type: 'heart',
      x: CX + rnd(-60, 60),
      y: CY + rnd(-20, 20),
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - rnd(1, 6),
      size: rnd(10, 22),
      color: Math.random() < 0.6 ? '#ff4081' : '#f48fb1',
      alpha: 1,
      gravity: 0.18,
      life: rnd(70, 130)
    });
  }

  // emoji flowers
  for (let i = 0; i < 15; i++) {
    const angle = rnd(0, PI2);
    const speed = rnd(2, 7);
    confettiParticles.push({
      type: 'emoji',
      x: CX + rnd(-80, 80),
      y: CY,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - rnd(2, 5),
      emoji: EMOJIS[rndInt(0, EMOJIS.length - 1)],
      size: rnd(18, 32),
      alpha: 1,
      gravity: 0.15,
      life: rnd(80, 140)
    });
  }
}

function drawConfettiHeart(ctx, x, y, size, color, alpha) {
  const s = size / 10;
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(s, s);
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(0, -3);
  ctx.bezierCurveTo(0, -6, -5, -6, -5, -2);
  ctx.bezierCurveTo(-5, 2, 0, 6, 0, 8);
  ctx.bezierCurveTo(0, 6, 5, 2, 5, -2);
  ctx.bezierCurveTo(5, -6, 0, -6, 0, -3);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function loopConfetti() {
  confettiCtx.clearRect(0, 0, confettiW, confettiH);
  let alive = false;

  for (let i = confettiParticles.length - 1; i >= 0; i--) {
    const p = confettiParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += p.gravity;
    p.vx *= 0.99;
    p.alpha -= 1 / p.life;
    p.life--;
    if (p.life <= 0 || p.alpha <= 0) { confettiParticles.splice(i, 1); continue; }
    alive = true;

    if (p.type === 'circle') {
      confettiCtx.globalAlpha = Math.max(0, p.alpha);
      confettiCtx.fillStyle = p.color;
      confettiCtx.beginPath();
      confettiCtx.arc(p.x, p.y, p.r, 0, PI2);
      confettiCtx.fill();
    } else if (p.type === 'heart') {
      drawConfettiHeart(confettiCtx, p.x, p.y, p.size, p.color, Math.max(0, p.alpha));
    } else if (p.type === 'emoji') {
      confettiCtx.globalAlpha = Math.max(0, p.alpha);
      confettiCtx.font = `${p.size}px serif`;
      confettiCtx.textAlign = 'center';
      confettiCtx.fillText(p.emoji, p.x, p.y);
    }
    confettiCtx.globalAlpha = 1;
  }

  if (alive) {
    confettiRAF = requestAnimationFrame(loopConfetti);
  } else {
    confettiCanvas.style.display = 'none';
  }
}

function triggerExplosion() {
  confettiCanvas.style.display = 'block';
  spawnConfettiExplosion();
  if (confettiRAF) cancelAnimationFrame(confettiRAF);
  loopConfetti();
}

// ═══════════════════════════════════════════════
//  TYPEWRITER
// ═══════════════════════════════════════════════
const MESSAGE_PARTS = [
  { text: 'Құрметті ', class: '' },
  { text: 'Алтынай және менің сүйікті Аяжан', class: 'highlight' },
  { text: '!\n\nСіздерді ', class: '' },
  { text: '8 Наурыз', class: 'highlight' },
  { text: ' мерекесімен шын жүректен құттықтаймын.\n\nКүтімдеріңіз, қолдауларыңыз және махаббаттарыңыз үшін рахмет.\n\nСіздер — менің өмірімдегі ', class: '' },
  { text: 'ең маңызды әйелдер', class: 'highlight' },
  { text: '.\n\nМен сіздерді ', class: '' },
  { text: 'өте жақсы көремін', class: 'highlight' },
  { text: ' ❤️', class: '' }
];

// flatten to character array with metadata
function buildCharList() {
  const list = [];
  MESSAGE_PARTS.forEach(part => {
    for (const ch of part.text) {
      list.push({ ch, cls: part.class });
    }
  });
  return list;
}

function typeMessage(onDone) {
  const el = $('messageText');
  el.innerHTML = '';
  const chars = buildCharList();
  let i = 0;
  let currentSpan = null;
  let lastCls = null;

  // build spans progressively
  function tick() {
    if (i >= chars.length) { onDone && onDone(); return; }
    const { ch, cls } = chars[i++];
    if (ch === '\n') {
      el.appendChild(document.createElement('br'));
      currentSpan = null; lastCls = null;
    } else {
      if (cls !== lastCls || !currentSpan) {
        currentSpan = document.createElement('span');
        if (cls) currentSpan.className = cls;
        el.appendChild(currentSpan);
        lastCls = cls;
      }
      currentSpan.textContent += ch;
    }
    const delay = ch === '.' || ch === '!' ? 180 : ch === ',' ? 100 : ch === '\n' ? 250 : 28;
    setTimeout(tick, delay);
  }
  tick();
}

// ═══════════════════════════════════════════════
//  INTRO → MAIN
// ═══════════════════════════════════════════════
let introGone = false;
function dismissIntro() {
  if (introGone) return;
  introGone = true;
  $('intro').classList.add('fade-out');
  setTimeout(() => {
    $('intro').style.display = 'none';
    $('main').classList.add('visible');
  }, 850);
}

$('intro').addEventListener('click', dismissIntro);
$('intro').addEventListener('touchend', e => { e.preventDefault(); dismissIntro(); });
setTimeout(dismissIntro, 3500);

// ═══════════════════════════════════════════════
//  MAGIC BUTTON
// ═══════════════════════════════════════════════
let magicFired = false;
$('magicBtn').addEventListener('click', function() {
  if (magicFired) return;
  magicFired = true;
  this.classList.add('hidden');

  // confetti explosion
  triggerExplosion();

  // show message wrap, start typewriter after short pause
  $('messageWrap').classList.add('show');
  setTimeout(() => {
    typeMessage(() => {
      setTimeout(() => {
        $('signature').classList.add('show');
      }, 400);
    });
  }, 600);
});

// ═══════════════════════════════════════════════
//  AUDIO (Web Audio API — soft tone melody)
// ═══════════════════════════════════════════════
let audioCtx = null;
let audioPlaying = false;
let masterGain = null;
let oscNodes = [];

function buildMelody(ctx) {
  // A gentle pentatonic sequence — C D E G A
  const notes = [261.63, 293.66, 329.63, 392, 440, 392, 329.63, 293.66];
  const bpm = 72;
  const beatLen = 60 / bpm;
  const now = ctx.currentTime;

  masterGain = ctx.createGain();
  masterGain.gain.setValueAtTime(0, now);
  masterGain.gain.linearRampToValueAtTime(0.12, now + 0.5);
  masterGain.connect(ctx.destination);

  // reverb via convolver (simple approach: delay + feedback)
  const delay = ctx.createDelay(0.5);
  delay.delayTime.value = 0.3;
  const fb = ctx.createGain();
  fb.gain.value = 0.35;
  delay.connect(fb);
  fb.connect(delay);
  delay.connect(masterGain);

  function scheduleNotes(startTime) {
    const group = [];
    notes.forEach((freq, idx) => {
      const osc = ctx.createOscillator();
      const g   = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      const t0 = startTime + idx * beatLen;
      const t1 = t0 + beatLen * 0.7;
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(0.6, t0 + 0.05);
      g.gain.exponentialRampToValueAtTime(0.001, t1);
      osc.connect(g);
      g.connect(masterGain);
      g.connect(delay);
      osc.start(t0);
      osc.stop(t1 + 0.05);
      group.push(osc);

      // harmonics (octave up, softer)
      const osc2 = ctx.createOscillator();
      const g2   = ctx.createGain();
      osc2.type = 'sine';
      osc2.frequency.value = freq * 2;
      g2.gain.setValueAtTime(0, t0);
      g2.gain.linearRampToValueAtTime(0.18, t0 + 0.05);
      g2.gain.exponentialRampToValueAtTime(0.001, t1);
      osc2.connect(g2);
      g2.connect(masterGain);
      osc2.start(t0);
      osc2.stop(t1 + 0.05);
      group.push(osc2);
    });
    oscNodes = group;
    return startTime + notes.length * beatLen + 0.2;
  }

  let nextStart = now + 0.1;
  function loop() {
    if (!audioPlaying) return;
    nextStart = scheduleNotes(nextStart);
    const delay_ms = (nextStart - ctx.currentTime - 0.3) * 1000;
    setTimeout(loop, Math.max(100, delay_ms));
  }
  loop();
}

function startAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  audioPlaying = true;
  buildMelody(audioCtx);
  $('audioBtn').textContent = '🔊';
}

function stopAudio() {
  audioPlaying = false;
  if (masterGain) {
    masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
  }
  $('audioBtn').textContent = '🔇';
}

$('audioBtn').addEventListener('click', () => {
  if (audioPlaying) {
    stopAudio();
  } else {
    startAudio();
  }
});
</script>
