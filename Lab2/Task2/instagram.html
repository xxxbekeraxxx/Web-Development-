<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Login</title>
  <link rel="stylesheet" href="instagram.css">
</head>
<body>
  <div class="page">
    <div class="left">
      <div class="image-box">
        <img src="https://cdn-web.loomly.com/hubfs/44173479/_2460149_Blogfeaturedimage-InstagramStories_100424.png" class="phone">
        <div class="text">
          <p>
            Посмотрите, какими<br>
            моментами из жизни<br>
            поделились ваши <span>близкие друзья</span>.
          </p>
        </div>
      </div>
    </div>

    <div class="right">
      <div class="box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/9/95/Instagram_logo_2022.svg" class="logo">

        <input type="text" placeholder="Имя пользователя, телефон или email">
        <input type="password" placeholder="Пароль">

        <button class="login">Войти</button>
        <a href="#" class="forgot">Забыли пароль?</a>

        <div class="or">
          <span></span>
          <p>ИЛИ</p>
          <span></span>
        </div>

        <button class="fb">Войти через Facebook</button>
      </div>

      <div class="signup">
        <p>Нет аккаунта? <a href="#">Зарегистрироваться</a></p>
      </div>
    </div>
  </div>
</body>
</html>
