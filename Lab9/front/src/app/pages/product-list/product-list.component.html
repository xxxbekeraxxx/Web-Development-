<section class="toolbar">
  <input type="text" [formControl]="search" placeholder="Search products..." />
  <select [formControl]="category">
    <option value="">All Categories</option>
    <option *ngFor="let c of categories" [value]="c.slug">{{ c.name }} ({{ c.product_count || 0 }})</option>
  </select>
  <select [formControl]="sort">
    <option value="newest">Newest</option>
    <option value="price_asc">Price: Low to High</option>
    <option value="price_desc">Price: High to Low</option>
  </select>
</section>

<section class="grid">
  <article class="card" *ngFor="let product of products">
    <img
      [src]="getProductImage(product)"
      [alt]="product.name"
      (error)="useFallbackImage($event, product.category.slug)"
    />
    <div class="meta">
      <span class="badge">{{ product.category.name }}</span>
      <h3>{{ product.name }}</h3>
      <p>{{ product.price | currency }}</p>
      <a [routerLink]="['/products', product.id]">View Details</a>
    </div>
  </article>
</section>

<div class="pager">
  <button (click)="prevPage()" [disabled]="page === 1">Previous</button>
  <span>Page {{ page }}</span>
  <button (click)="nextPage()" [disabled]="page * 10 >= count">Next</button>
</div>
