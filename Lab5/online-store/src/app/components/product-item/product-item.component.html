<div class="card">
  <a [href]="product().link" target="_blank" class="product-link">
    <img [src]="product().image" [alt]="product().name" class="product-image">
  </a>
  <div class="card-content">
    <h3 class="product-name">
      <a [href]="product().link" target="_blank">{{ product().name }}</a>
    </h3>
    <p class="product-description">{{ product().description }}</p>
    <div class="price-rating">
      <span class="price">{{ product().price | number }} ₸</span>
      <span class="rating">★ {{ product().rating }}</span>
    </div>
    <div class="likes">
      ❤️ {{ product().likes }}
    </div>
    <div class="actions">
      <button (click)="onLike()" class="btn like-btn">❤️ Like</button>
      <button (click)="shareOnWhatsApp()" class="btn whatsapp">WhatsApp</button>
      <button (click)="shareOnTelegram()" class="btn telegram">Telegram</button>
      <button (click)="onDelete()" class="btn delete-btn">Удалить</button>
    </div>
  </div>
</div>
